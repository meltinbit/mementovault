services:
  app:
    build: .
    ports:
      - "4242:80"
    env_file: .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - storage:/app/storage/app

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: mementovault
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mementovault
      MINIO_ROOT_PASSWORD: mementovault
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 mementovault mementovault;
      mc mb local/mementovault --ignore-existing;
      mc anonymous set download local/mementovault;
      exit 0;
      "

volumes:
  mysql_data:
  minio_data:
  storage:
